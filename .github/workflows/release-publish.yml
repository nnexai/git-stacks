name: Publish npm packages

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish trusted npm packages
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: npm install --global npm@11.17.0
      - run: npm ci
      - name: Verify release metadata
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: node -e "const p=require('./package.json'); const prerelease=p.version.includes('-'); if (process.env.RELEASE_TAG !== 'v'+p.version) throw new Error('Release tag does not match package version'); if ((process.env.RELEASE_PRERELEASE === 'true') !== prerelease) throw new Error('GitHub prerelease state does not match package version')"
      - run: npm run release:check
      - run: node scripts/pack-release.mjs
      - name: Publish with npm trusted publishing
        env:
          GITHUB_REF_NAME: ${{ github.event.release.tag_name }}
          NPM_DIST_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
        run: node scripts/publish-release.mjs
