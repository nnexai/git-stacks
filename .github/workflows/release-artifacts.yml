name: Release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-and-pack:
    name: Verify RC and pack npm artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install required shells
        run: |
          sudo apt-get update
          sudo apt-get install --yes bash zsh fish openssh-client
      - run: npm install --global npm@11.17.0
      - run: npm ci
      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const p=require('./package.json'); if (process.env.RELEASE_TAG !== 'v'+p.version) throw new Error('Tag does not match package version')"
      - run: npm run release:check
      - run: node scripts/pack-release.mjs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages-${{ github.ref_name }}
          path: release/npm/
          if-no-files-found: error
          retention-days: 30
