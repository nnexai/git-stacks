name: Node runtime matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-runtime:
    name: Node 24 / ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm, macos-15-intel, macos-15]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:packages
      - run: npm run typecheck
      - run: npm run test:architecture
      - run: npm run test:deps
      - run: npm run test:vitest
      - run: npm run test:node
      - run: npm audit --omit=dev --workspace @git-stacks/cli --workspace @git-stacks/service

  optional-tui:
    name: Optional Bun TUI
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: npm ci
      - run: npm run typecheck -w @git-stacks/tui
      - run: npm run tui:build
      - run: npm run test:tui
