name: Build and test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-runtime:
    name: Node 24 / ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm, macos-15-intel, macos-15]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm install --global npm@11.17.0
      - run: npm ci
      - run: npm run build:packages
      - run: npm run typecheck
      - run: npm run test:architecture
      - run: npm run test:deps
      - run: npm run test:vitest
      - run: npm run test:node
      - run: node scripts/check-packages.mjs --native-only

  package-artifacts:
    name: Package and policy gates
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: npm install --global npm@11.17.0
      - run: npm ci
      - run: npm run check:packages
      - run: npm run audit:licenses
      - run: npm run audit:runtime
      - run: node scripts/pack-release.mjs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-packages-${{ github.sha }}
          path: release/npm/
          if-no-files-found: error
          retention-days: 7

  optional-tui:
    name: Optional Bun TUI
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, macos-15-intel, macos-15]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: npm install --global npm@11.17.0
      - run: npm ci
      - run: npm run build:packages
      - run: npm run typecheck -w @git-stacks/tui
      - run: npm run tui:build
      - run: npm run test:tui
